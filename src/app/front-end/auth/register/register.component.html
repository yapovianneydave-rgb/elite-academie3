<section class="register-page">
  <div class="overlay d-flex justify-content-center align-items-center">
    <div class="register-card">

      <!-- LOGO -->
      <div class="text-center mb-4">
        <img src="assets/images/logo-ea-login.png" alt="Logo" class="register-logo" />
      </div>

      <!-- STEPPER HEADER -->
      <div class="stepper-header mb-4">
        <div class="step" [class.active]="currentStep >= 1" [class.done]="currentStep > 1">
          <div class="step-circle">
            <i *ngIf="currentStep > 1" class="bi bi-check-lg"></i>
            <span *ngIf="currentStep <= 1">1</span>
          </div>
          <div class="step-label">Identité</div>
        </div>
        <div class="step-line" [class.done]="currentStep > 1"></div>
        <div class="step" [class.active]="currentStep >= 2" [class.done]="currentStep > 2">
          <div class="step-circle">
            <i *ngIf="currentStep > 2" class="bi bi-check-lg"></i>
            <span *ngIf="currentStep <= 2">2</span>
          </div>
          <div class="step-label">Coordonnées</div>
        </div>
        <div class="step-line" [class.done]="currentStep > 2"></div>
        <div class="step" [class.active]="currentStep >= 3">
          <div class="step-circle">3</div>
          <div class="step-label">Sécurité</div>
        </div>
      </div>

      <!-- ÉTAPE 1 : Identité -->
      <div *ngIf="currentStep === 1" class="step-content animate-step">
        <h5 class="step-title">Votre identité</h5>
        <p class="step-subtitle">Qui êtes-vous ?</p>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nom <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" placeholder="Votre nom"
                     [(ngModel)]="form.nom" name="nom" />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Prénom <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" placeholder="Votre prénom"
                     [(ngModel)]="form.prenom" name="prenom" />
            </div>
          </div>

          <!-- CHAMP RÔLE - BOUTONS RADIO VISUELS -->
          <div class="col-12">
            <label class="form-label">Vous êtes <span class="text-danger">*</span></label>
            <div class="role-selector">
              <label class="role-card" [class.selected]="form.role === 'repetiteur'">
                <input type="radio" [(ngModel)]="form.role" name="role" value="repetiteur" />
                <div class="role-icon">
                  <i class="bi bi-easel"></i>
                </div>
                <div class="role-title">Répétiteur</div>
                <div class="role-check">
                  <i class="bi bi-check-circle-fill"></i>
                </div>
              </label>

              <label class="role-card" [class.selected]="form.role === 'parent'">
                <input type="radio" [(ngModel)]="form.role" name="role" value="parent" />
                <div class="role-icon">
                  <i class="bi bi-people"></i>
                </div>
                <div class="role-title">Parent</div>
                <div class="role-check">
                  <i class="bi bi-check-circle-fill"></i>
                </div>
              </label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <button class="btn btn-next" (click)="nextStep()">
            Suivant <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- ÉTAPE 2 : Coordonnées -->
      <div *ngIf="currentStep === 2" class="step-content animate-step">
        <h5 class="step-title">Vos coordonnées</h5>
        <p class="step-subtitle">Comment vous contacter ?</p>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Téléphone <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-telephone"></i></span>
              <input type="tel" class="form-control" placeholder="Votre numéro"
                     [(ngModel)]="form.telephone" name="telephone" />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" class="form-control" placeholder="Votre email"
                     [(ngModel)]="form.email" name="email" />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Commune</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
              <input type="text" class="form-control" placeholder="Votre commune"
                     [(ngModel)]="form.commune" name="commune" />
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Quartier</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-map"></i></span>
              <input type="text" class="form-control" placeholder="Votre quartier"
                     [(ngModel)]="form.quartier" name="quartier" />
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <button class="btn btn-back" (click)="prevStep()">
            <i class="bi bi-arrow-left"></i> Retour
          </button>
          <button class="btn btn-next" (click)="nextStep()">
            Suivant <i class="bi bi-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- ÉTAPE 3 : Sécurité -->
      <div *ngIf="currentStep === 3" class="step-content animate-step">
        <h5 class="step-title">Sécurité</h5>
        <p class="step-subtitle">Choisissez un mot de passe sécurisé</p>

        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">Mot de passe <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                     placeholder="Votre mot de passe"
                     [(ngModel)]="form.password" name="password"
                     autocomplete="new-password" />
              <span class="input-group-text" style="cursor:pointer" (click)="showPassword = !showPassword">
                <i [class]="showPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </span>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Confirmer le mot de passe <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input [type]="showConfirm ? 'text' : 'password'" class="form-control"
                     placeholder="Confirmez votre mot de passe"
                     [(ngModel)]="form.confirm" name="confirm"
                     autocomplete="new-password" />
              <span class="input-group-text" style="cursor:pointer" (click)="showConfirm = !showConfirm">
                <i [class]="showConfirm ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
              </span>
            </div>
          </div>

          <!-- CONDITIONS -->
          <div class="col-12 mt-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox"
                     [(ngModel)]="form.acceptConditions" name="conditions" id="conditions" />
              <label class="form-check-label" for="conditions">
                J'accepte les <a href="#" class="text-success">conditions générales</a>
              </label>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <button class="btn btn-back" (click)="prevStep()">
            <i class="bi bi-arrow-left"></i> Retour
          </button>
          <button class="btn btn-submit" (click)="onSubmit()">
            <i class="bi bi-check-circle"></i> S'inscrire
          </button>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="text-center mt-4">
        <span class="text-muted small">Vous avez déjà un compte ? </span>
        <a routerLink="/auth/login" class="text-success fw-bold">Se connecter</a>
      </div>
      <div class="text-center mt-2">
        <p class="text-muted small">© 2026 Structure Elite Academie</p>
      </div>

    </div>
  </div>
</section>
