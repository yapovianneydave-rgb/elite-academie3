<!-- Sign in Start -->
<section class="sign-in-page bg-white">
  <div class="container-fluid p-0">
    <div class="row no-gutters">
      <div class="col-sm-6 align-self-center">
        <div class="sign-in-from">
          <h1 class="mb-0">NOUVEL UTILISATEUR</h1>
          <p>Veuillez remplir le formulaire pour pouvoir vous inscrire</p>
          <form class="mt-4">
            <div class="row">
              <div class="col-md-6">
                <div class="form-group">
                  <label>Nom</label>
                  <input type="text" class="form-control" placeholder="Veuillez entrer votre nom">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>Prénom</label>
                  <input type="text" class="form-control" placeholder="Veuillez entrer votre prénom">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>Numéro de téléphone</label>
                  <input type="tel"
                         class="form-control"
                         [(ngModel)]="phoneNumber"
                         name="phone"
                         placeholder="Entrez votre numéro de téléphone">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>Commune</label>
                  <select class="form-control"
                          [(ngModel)]="selectedCommune"
                          name="commune">
                    <option value="" disabled selected>Sélectionner votre commune</option>
                    <option *ngFor="let commune of communes" [value]="commune.id">
                      {{ commune.nom }}
                    </option>
                  </select>
                </div>
              </div>

              <!-- Quartier - Champ de saisie libre -->
              <div class="col-md-6">
                <div class="form-group">
                  <label>Quartier</label>
                  <input type="text"
                         class="form-control"
                         [(ngModel)]="quartier"
                         name="quartier"
                         placeholder="Veuillez entrer votre quartier">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>Email</label>
                  <input type="email" class="form-control" placeholder="Veuillez entrer votre email">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>Mot de passe</label>
                  <input type="password" class="form-control" placeholder="Entrez votre mot de passe">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group">
                  <label>Confirmez votre mot de passe</label>
                  <input type="password" class="form-control" placeholder="Veuillez confirmer votre mot de passe">
                </div>
              </div>
            </div>
            <div class="d-inline-block w-100 mt-3">
              <div class="custom-control custom-checkbox d-inline-block mt-2 pt-1">
                <input type="checkbox" class="custom-control-input" id="customCheck1">
                <label class="custom-control-label" for="customCheck1">
                  J'accepte les <a href="#">conditions générales</a>
                </label>
              </div>
              <button type="submit" class="btn btn-primary float-right">
                S'enregistrer
                <span class="btn-icon">→</span>
              </button>
            </div>

            <div class="sign-info mt-3">
              <span class="dark-color d-inline-block line-height-2">
                Vous avez déjà un compte ?
                <a [routerLink]="'/auth/login'">Se connecter</a>
              </span>
              <div class="text-lg-center mt-4">
                <p class="text-muted small">© {{ currentYear }} Structure Academie Elite</p>
              </div>
              <ul class="iq-social-media">
                <div class="social-links d-flex justify-content-center gap-3 mt-4">
                  <a href="https://www.facebook.com/share/1DaUDE43Mp/?mibextid=wwXIfr"
                     target="_blank"
                     rel="noopener noreferrer"
                     class="social-btn">
                    <i class="bi bi-facebook"></i>
                  </a>
                  <a href="https://twitter.com/votrecompte"
                     target="_blank"
                     rel="noopener noreferrer"
                     class="social-btn">
                    <i class="bi bi-twitter-x"></i>
                  </a>

                  <a href="https://instagram.com/votrecompte"
                     target="_blank"
                     rel="noopener noreferrer"
                     class="social-btn">
                    <i class="bi bi-instagram"></i>
                  </a>
                </div>
              </ul>
            </div>

          </form>
        </div>
      </div>
      <div class="col-sm-6 text-center">
        <div class="sign-in-detail text-white"
             style="background: url(/assets/images/image_appli/imageappli.jpg) no-repeat 0 0; background-size: cover;">
        </div>
      </div>

    </div>
  </div>
</section>
